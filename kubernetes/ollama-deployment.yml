apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: wow-ai-agents
  labels:
    app: wow-ai
    component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wow-ai
      component: ollama
  template:
    metadata:
      labels:
        app: wow-ai
        component: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
            limits:
              cpu: "8000m"
              memory: "32Gi"
              # Uncomment for GPU support:
              # nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: wow-ai-agents
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: wow-ai-agents
spec:
  selector:
    app: wow-ai
    component: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
