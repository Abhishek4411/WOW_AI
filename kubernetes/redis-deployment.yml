apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: wow-ai-agents
  labels:
    app: wow-ai
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wow-ai
      component: redis
  template:
    metadata:
      labels:
        app: wow-ai
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
          envFrom:
            - secretRef:
                name: wow-ai-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: wow-ai-agents
spec:
  selector:
    app: wow-ai
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
